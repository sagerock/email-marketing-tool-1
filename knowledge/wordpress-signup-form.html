<!--
  AI for Business Signup Form
  Paste this into a WordPress "Custom HTML" block on your landing page.
  It submits to the email marketing tool's public signup endpoint.
-->
<div id="ai-biz-signup" style="max-width: 480px; margin: 2rem auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <form id="ai-biz-form" style="display: flex; flex-direction: column; gap: 1rem;">
    <div>
      <label for="ai-biz-name" style="display: block; margin-bottom: 0.25rem; font-weight: 600; color: #333;">First Name</label>
      <input type="text" id="ai-biz-name" name="first_name" required
        placeholder="Your first name"
        style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box;" />
    </div>
    <div>
      <label for="ai-biz-email" style="display: block; margin-bottom: 0.25rem; font-weight: 600; color: #333;">Email</label>
      <input type="email" id="ai-biz-email" name="email" required
        placeholder="you@example.com"
        style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box;" />
    </div>
    <button type="submit" id="ai-biz-submit"
      style="padding: 0.75rem 1.5rem; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;">
      Sign Up for the Free Series
    </button>
    <p id="ai-biz-message" style="margin: 0; text-align: center; font-size: 0.9rem; min-height: 1.4em;"></p>
  </form>
</div>

<script>
(function() {
  var API_URL = 'https://mail.sagerock.com/api/public/signup';
  var form = document.getElementById('ai-biz-form');
  var btn = document.getElementById('ai-biz-submit');
  var msg = document.getElementById('ai-biz-message');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var name = document.getElementById('ai-biz-name').value.trim();
    var email = document.getElementById('ai-biz-email').value.trim();

    if (!name || !email) return;

    btn.disabled = true;
    btn.textContent = 'Signing up...';
    msg.textContent = '';
    msg.style.color = '#333';

    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        first_name: name,
        email: email,
        source: 'wordpress-ai-for-business'
      })
    })
    .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
    .then(function(result) {
      if (result.ok) {
        msg.style.color = '#16a34a';
        msg.textContent = "You're in! Check your email for a welcome message.";
        form.reset();
      } else {
        msg.style.color = '#dc2626';
        msg.textContent = result.data.error || 'Something went wrong. Please try again.';
      }
    })
    .catch(function() {
      msg.style.color = '#dc2626';
      msg.textContent = 'Could not connect. Please try again later.';
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = 'Sign Up for the Free Series';
    });
  });
})();
</script>
